spring:
  application:
    name: plazoleta-restaurant-ms

  # Configuracion PostgreSQL
  # CORREGIDO: Credenciales movidas a variables de entorno (Problema 20, 31, 32)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:powerup_pragma}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  # MongoDB para trazabilidad HU-17
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/plazoleta_trazabilidad}
      auto-index-creation: true

  # Configuracion JPA
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

server:
  port: 8081
  error:
    include-message: always
    include-binding-errors: always

# Configuracion JWT
# CORREGIDO: Secret movido a variable de entorno (Problema 20)
jwt:
  secret: ${JWT_SECRET:defaultDevSecretThatMustBeChangedInProduction0123456789}
  expiration: ${JWT_EXPIRATION:86400000}

# Configuracion OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    root: INFO
    com.pragma.powerup: DEBUG
    org.hibernate.SQL: DEBUG

appDescription: "Pragma Powerup - Plaza de Comidas"
appVersion: "1.0.0"